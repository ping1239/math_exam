name: Deploy to GitHub Pages

on:
  # 기본 브랜치(main)에 push가 일어날 때마다 실행됩니다.
  push:
    branches: [ "main" ]
  # GitHub Actions 탭에서 수동으로 실행할 수 있도록 허용합니다.
  workflow_dispatch:

# GitHub Pages 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 실행되는 배포 취소
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build
        # 레포지토리 이름을 base url로 사용하기 위해 환경 변수로 전달합니다.
        # 이렇게 하면 GitHub Pages의 /repo-name/ 하위 경로에서도 리소스(js, css 등)를 올바르게 불러올 수 있습니다.
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Copy index.html to 404.html (SPA Fallback)
        run: cp dist/public/index.html dist/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # build 스크립트 결과물 중 정적 파일들이 모이는 폴더를 지정합니다.
          path: './dist/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
